server:
    port: 8081

spring:
    datasource:
        url: jdbc:mysql://localhost:3307/db_catalogo
        username: root
        password: root
        driver-class-name: com.mysql.cj.jdbc.Driver
    flyway:
        enabled: false

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true
